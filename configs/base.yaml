{
  "tokenizer": {
    "max_mission_length": 32,
    "lowercase": true,
    "regex_pattern": "[a-z]+"
  },
  "ppo": {
    "policy": "MultiInputPolicy",
    "learning_rate": 0.0001,
    "end_learning_rate": null,
    "learning_rate_period": null,
    "n_steps": 128,
    "batch_size": 256,
    "n_epochs": 4,
    "gamma": 0.99,
    "gae_lambda": 0.99,
    "clip_range": 0.2,
    "ent_coef": 0.01,
    "vf_coef": 0.5,
    "max_grad_norm": 0.5,
    "net_arch": [],
    "verbose": 0
  },
  "bc": {
    "epochs": 10,
    "batch_size": 128,
    "learning_rate": 0.0001,
    "weight_decay": 0.0,
    "clip_grad_norm": 0.5,
    "aux_weight": null,
    "action_reweight_on_holding_target": 1.0,
    "min_sampling_proba": 0.1,
    "sampling_episode_budget_per_task": null
  },
  "curriculum": {
    "promote_success_rate": 0.95,
    "promote_consecutive_evals": 3,
    "current_stage_fraction": 0.8,
    "replay_fraction": 0.2,
    "sampling_uniform_alpha": 0.2
  },
  "training": {
    "seed": 42,
    "device": "auto",
    "n_envs": 8,
    "total_timesteps": 1000000,
    "save_freq": 50000,
    "eval_freq": 10000,
    "n_eval_episodes": 10
  },
  "artifacts": {
    "root": "./sneddy_baby_ai/artifacts",
    "checkpoints": "./sneddy_baby_ai/artifacts/checkpoints",
    "exports": "./sneddy_baby_ai/artifacts/exports",
    "eval": "./sneddy_baby_ai/artifacts/eval",
    "demos": "./sneddy_baby_ai/artifacts/demos",
    "vocab_path": "./sneddy_baby_ai/artifacts/global_vocab.json",
    "logs": "./sneddy_baby_ai/artifacts/logs"
  },
  "env": {
    "train_envs": []
  }
}
